    ansible_user: ubuntu
    # Optional: SSH key file path if not using agent
    # ansible_ssh_private_key_file: ~/.ssh/id_rsa
  children:
    control_plane:
      hosts:
        cp-arm64:
          ansible_host: 192.168.10.10
          k8s_node_name: cp-arm64
    workers_public:
      hosts:
        wk-public-amd64:
          ansible_host: 192.168.10.11
          k8s_node_name: wk-public-amd64
