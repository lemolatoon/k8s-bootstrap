# Global cluster settings
cluster_name: homelab
pod_subnet: 10.244.0.0/16
service_subnet: 10.96.0.0/12

# Kubernetes minor version channel per official repo (pkgs.k8s.io)
# See: https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/
kubernetes_minor_channel: v1.33

# Control plane advertise address (control-plane node LAN IP)
control_plane_ip: 192.168.10.10

public_ip_host: wk-public-amd64
public_ip_label:
  key: ip
  value: public

# Raspberry Pi (or ARM SBC) node labeling
# - Set which inventory hosts should get the raspi label
# - The role will label the corresponding Kubernetes Node name
#   with `<raspi_label.key>=<raspi_label.value>`
raspi_inventory_hosts:
  - cp-arm64
raspi_label:
  key: device
  value: raspi

argocd_host: argocd.lemolatoo.net

# Manage firewall with ufw (optional)
manage_ufw: false

# Argo CD settings (moved from role defaults)
# - Private token is set in: ansible/roles/argocd/vars/private.yml (see private.example.yml)
repo_url_https: "https://github.com/lemolatoon/home-k8s-yaml.git"
repo_dest: "/root/home-k8s-yaml"
applications_dir: "{{ repo_dest }}/manifests/argocd"
argocd_external_url: "https://{{ argocd_host }}"
