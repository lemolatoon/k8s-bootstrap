---
# Install Cilium via Helm following official docs:
# https://docs.cilium.io/en/stable/installation/kubernetes/helm/

- name: Set local kubeconfig path for delegated tasks
  ansible.builtin.set_fact:
    local_kubeconfig_path: "/tmp/kubeconfig-{{ cluster_name }}.yaml"
  delegate_to: localhost
  delegate_facts: true
  run_once: true

- name: Ensure kubeconfig content is available for delegated tasks
  ansible.builtin.assert:
    that:
      - hostvars[groups['all'][0]].kubeconfig_content is defined
    fail_msg: >-
      kubeconfig_content is not defined. Run the kubernetes role first so the
      kubeconfig is slurped and distributed.
  delegate_to: localhost
  run_once: true

- name: Write kubeconfig locally for delegated tasks
  ansible.builtin.copy:
    dest: "{{ hostvars['localhost'].local_kubeconfig_path }}"
    content: "{{ hostvars[groups['all'][0]].kubeconfig_content }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true

- name: Add Cilium Helm repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io
    kubeconfig: "{{ hostvars['localhost'].local_kubeconfig_path | default(kubeconfig_path) }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Install/Upgrade Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    release_namespace: kube-system
    create_namespace: false
    kubeconfig: "{{ hostvars['localhost'].local_kubeconfig_path | default(kubeconfig_path) }}"
    update_repo_cache: true
    wait: true
    release_values:
      kubeProxyReplacement: false
      nodeIPAM:
        enabled: true
      k8sServiceHost: "{{ hostvars[control_plane_ip | default(groups['control_plane'][0])].ansible_host }}"
      k8sServicePort: 6443
      ipam:
        mode: cluster-pool
        operator:
          clusterPoolIPv4MaskSize: 24
          clusterPoolIPv4PodCIDRList:
            - 172.20.0.0/16
  delegate_to: localhost
  become: false
  run_once: true

- name: Wait for Cilium pods to be Ready
  ansible.builtin.shell: |
    set -o errexit -o nounset -o pipefail
    export KUBECONFIG={{ kubeconfig_path }}
    kubectl -n kube-system rollout status ds/cilium --timeout=5m
  args:
    executable: /bin/bash
  changed_when: false
