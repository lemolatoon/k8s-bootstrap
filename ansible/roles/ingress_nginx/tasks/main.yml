---
# Install ingress-nginx via Helm following official docs:
# https://kubernetes.github.io/ingress-nginx/deploy/

- name: Add ingress-nginx Helm repo
  shell: |
    set -o errexit -o nounset -o pipefail
    export KUBECONFIG={{ kubeconfig_path }}
    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx || true
    helm repo update
  changed_when: false

- name: Render chart values for ingress-nginx
  template:
    src: values.yaml.j2
    dest: /root/ingress-nginx-values.yaml
    mode: '0644'

- name: Install/Upgrade ingress-nginx pinned to public node
  shell: |
    set -o errexit -o nounset -o pipefail
    export KUBECONFIG={{ kubeconfig_path }}
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
      --namespace ingress-nginx --create-namespace \
      -f /root/ingress-nginx-values.yaml \
      --wait
  register: ingress_install
  changed_when: "'release' in ingress_install.stdout or 'deployed' in ingress_install.stdout or ingress_install.rc == 0"

- name: Wait for ingress controller to be Ready
  shell: |
    set -o errexit -o nounset -o pipefail
    export KUBECONFIG={{ kubeconfig_path }}
    kubectl -n ingress-nginx rollout status {{ 'ds' if ingress_nginx.kind == 'DaemonSet' else 'deploy' }}/ingress-nginx-controller --timeout=5m
  changed_when: false
