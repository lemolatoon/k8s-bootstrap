---
# Install kubeadm/kubelet/kubectl per official docs:
# https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/

- name: Create keyring directory for Kubernetes APT repo
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Kubernetes APT Release.key
  become: true
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_channel }}/deb/Release.key"
    dest: /tmp/kubernetes-Release.key
    mode: "0644"
    force: true

- name: Convert key to keyring (gpg --dearmor)
  become: true
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - -o
      - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - /tmp/kubernetes-Release.key
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes APT repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_channel }}/deb/ /
    mode: '0644'

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: apt

- name: Unhold Kubernetes packages before versioned install
  dpkg_selections:
    name: "{{ item }}"
    selection: install
  loop:
    - kubelet
    - kubeadm
    - kubectl
  when: ansible_facts.packages[item] is defined

- name: Determine Kubernetes package version (from repo)
  block:
    - name: Set kubernetes minor (strip leading v)
      ansible.builtin.set_fact:
        k8s_minor_no_v: "{{ kubernetes_minor_channel | regex_replace('^v', '') }}"

    - name: Query available kubeadm versions via apt-cache (madison)
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - >-
            apt-get update -y >/dev/null 2>&1 || true;
            apt-cache madison kubeadm | awk -F'|' '{gsub(/ /, "", $2); print $2}'
      register: madison_kubeadm
      changed_when: false

    - name: Build candidate list by patch if provided
      ansible.builtin.set_fact:
        k8s_candidates_patch: >-
          {{
            (
              (madison_kubeadm.stdout_lines | default([]))
              | select('search', '^' ~ (kubernetes_patch_version | string) ~ '-')
              | list
            )
          }}
      when: kubernetes_patch_version is defined

    - name: Choose desired version from patch candidate list
      ansible.builtin.set_fact:
        k8s_pkg_version: "{{ k8s_candidates_patch[0] }}"
      when: kubernetes_patch_version is defined and (k8s_candidates_patch | default([]) | length) > 0

    - name: Build candidate list by minor channel (latest within minor)
      ansible.builtin.set_fact:
        k8s_candidates_minor: >-
          {{
            (
              (madison_kubeadm.stdout_lines | default([]))
              | select('search', '^' ~ ((k8s_minor_no_v | string) ~ '.'))
              | list
            )
          }}
      when: k8s_pkg_version is not defined

    - name: Choose desired version from minor candidate list
      ansible.builtin.set_fact:
        k8s_pkg_version: "{{ k8s_candidates_minor[0] }}"
      when: k8s_pkg_version is not defined and (k8s_candidates_minor | default([]) | length) > 0

    

    - name: Fail if Kubernetes package version not determined
      ansible.builtin.fail:
        msg: >-
          Could not determine Kubernetes package version for channel={{ kubernetes_minor_channel }}
          patch={{ kubernetes_patch_version | default('auto') }}. Ensure repo is reachable and contains packages.
      when: k8s_pkg_version is not defined

- name: Install kubeadm, kubelet, kubectl to exact version (allow downgrade)
  apt:
    update_cache: true
    name:
      - "kubelet={{ k8s_pkg_version }}"
      - "kubeadm={{ k8s_pkg_version }}"
      - "kubectl={{ k8s_pkg_version }}"
    state: present
    allow_downgrade: true


- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet service
  systemd:
    name: kubelet
    enabled: true
    state: started

- name: Initialize control plane (kubeadm init)
  when: inventory_hostname in groups['control_plane']
  block:
    - name: Render kubeadm configuration
      template:
        src: kubeadm-config.yaml.j2
        dest: /root/kubeadm-config.yaml
        mode: '0644'

    - name: Run kubeadm init if not yet initialized
      shell: kubeadm init --config /root/kubeadm-config.yaml
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Set up kubeconfig for root
      file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy admin.conf to kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Wait for Kubernetes API to respond
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig=/root/.kube/config
          - version
      register: kube_api_ready
      until: kube_api_ready.rc == 0
      retries: 20
      delay: 15
      changed_when: false

    - name: Get kubeadm join command
      shell: kubeadm token create --print-join-command
      register: join_cmd
      changed_when: false
      retries: 2
      delay: 15
      until: join_cmd.rc == 0

    # --- 空白で split して N 番目をそのまま抜き出す ---
    # 例: "kubeadm join 100.106.99.58:6443 --token 376... --discovery-token-ca-cert-hash sha256:..."
    # idx:   0       1          2             3     4      5                                6
    - name: Split join command into tokens (on first CP)
      set_fact:
        join_tokens_list: "{{ join_cmd.stdout | ansible.builtin.split }}"
      run_once: true
      delegate_to: "{{ groups['control_plane'][0] }}"

    - name: Set parsed join parts (on first CP)
      set_fact:
        join_endpoint: "{{ hostvars[groups['control_plane'][0]].join_tokens_list[2] }}"
        join_token: "{{ hostvars[groups['control_plane'][0]].join_tokens_list[4] }}"
        join_cahash_full: "{{ hostvars[groups['control_plane'][0]].join_tokens_list[6] }}"
      run_once: true
      delegate_to: "{{ groups['control_plane'][0] }}"

    # 念のための検証（最低 7 トークンある / 必須位置に期待するフラグがある）
    - name: Validate parsed tokens (on first CP)
      fail:
        msg: "Unexpected join command format: {{ join_cmd.stdout }}"
      when: >
        hostvars[groups['control_plane'][0]].join_tokens_list | length < 7 or
        hostvars[groups['control_plane'][0]].join_tokens_list[3] != '--token' or
        hostvars[groups['control_plane'][0]].join_tokens_list[5] != '--discovery-token-ca-cert-hash'
      run_once: true
      delegate_to: "{{ groups['control_plane'][0] }}"

# 3) 各ワーカーノード用の JoinConfiguration (v1beta4) を生成
- name: Prepare kubeadm join config (per node)
  when: inventory_hostname in (groups['workers'] | default([]) + groups['workers_public'] | default([]))
  copy:
    dest: /root/kubeadm-join.yaml
    mode: '0644'
    content: |
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: JoinConfiguration
      discovery:
        bootstrapToken:
          apiServerEndpoint: "{{ hostvars[groups['control_plane'][0]].join_endpoint }}"
          token: "{{ hostvars[groups['control_plane'][0]].join_token }}"
          caCertHashes:
          - "{{ hostvars[groups['control_plane'][0]].join_cahash_full }}"
      nodeRegistration:
        name: "{{ k8s_node_name | default(inventory_hostname) }}"
        criSocket: "unix:///run/containerd/containerd.sock"
        kubeletExtraArgs:
        - name: node-ip
          value: "{{ ansible_host }}"

- name: Join workers to cluster
  when: inventory_hostname in (groups['workers'] | default([]) + groups['workers_public'] | default([]))
  shell: kubeadm join --config /root/kubeadm-join.yaml -v=5
  args:
    creates: /etc/kubernetes/kubelet.conf

- name: Label public ingress worker node
  when: "'control_plane' in group_names"
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/root/.kube/config
    node_name="{{ hostvars[public_ip_host].k8s_node_name | default(public_ip_host) }}"
    kubectl get node "$node_name" >/dev/null 2>&1
    kubectl label node "$node_name" {{ public_ip_label.key }}={{ public_ip_label.value }} --overwrite
  args:
    executable: /bin/bash
  register: label_public
  retries: 3
  delay: 5
  until: label_public.rc == 0
  changed_when: false

- name: Label Raspberry Pi device nodes
  when:
    - "'control_plane' in group_names"
    - (raspi_inventory_hosts | default([])) | length > 0
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/root/.kube/config
    node_name="{{ hostvars[item].k8s_node_name | default(item) }}"
    kubectl get node "$node_name" >/dev/null 2>&1
    kubectl label node "$node_name" {{ raspi_label.key }}={{ raspi_label.value }} --overwrite
  args:
    executable: /bin/bash
  loop: "{{ raspi_inventory_hosts }}"
  loop_control:
    label: "{{ hostvars[item].k8s_node_name | default(item) }}"
  register: label_one
  retries: 60
  delay: 5
  until: label_one.rc == 0
  changed_when: false

- name: Decide source control-plane host for kubeconfig (run once)
  run_once: true
  ansible.builtin.set_fact:
    kubeconfig_src_host: >-
      {{
        'cp-arm64'
        if ('cp-arm64' in groups.get('control_plane', []))
        else (groups.get('control_plane', [])[0])
      }}
  failed_when: kubeconfig_src_host is not defined

- name: Slurp kubeconfig from control plane (run once, delegated)
  run_once: true
  delegate_to: "{{ kubeconfig_src_host }}"
  become: true
  ansible.builtin.slurp:
    src: /root/.kube/config
  register: kubeconfig_slurped

- name: Set decoded kubeconfig content (run once)
  run_once: true
  ansible.builtin.set_fact:
    kubeconfig_content: "{{ kubeconfig_slurped.content | b64decode }}"

- name: Ensure /root/.kube exists on each node
  become: true
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Distribute kubeconfig from cp-arm64 to each node
  become: true
  ansible.builtin.copy:
    dest: /root/.kube/config
    content: "{{ hostvars[groups['all'][0]].kubeconfig_content | default(kubeconfig_content) }}"
    mode: '0600'
